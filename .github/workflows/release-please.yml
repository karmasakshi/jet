name: release-please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4 # https://github.com/marketplace/actions/release-please-action
        with:
          release-type: node
          token: ${{ secrets.GITHUB_TOKEN }}
