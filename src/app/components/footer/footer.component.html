<ng-container *transloco="let t; prefix: 'jet-footer'">
  <div class="flex flex-col items-center gap-4">
    <a
      href="https://x.com/jetprojectdev"
      matButton
      target="_blank"
      [jetAnalyticsEvent]="{ name: 'open_x_profile' }"
    >
      <mat-icon svgIcon="alternate-email-fill" />
      <span>jetprojectdev</span>
    </a>
  </div>
  <p
    class="my-3 text-center"
    style="color: var(--mat-sys-outline-variant); font: var(--mat-sys-body-small)"
  >
    {{ t('v-x', { x: version }) }}
  </p>
</ng-container>
